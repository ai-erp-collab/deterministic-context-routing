<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="#0d1117"/>

  <text x="600" y="60" text-anchor="middle" fill="#c9d1d9" font-size="28" font-weight="600">Deterministic Context Routing</text>
  <text x="600" y="90" text-anchor="middle" fill="#8b949e" font-size="16">how a request becomes bounded, labeled context</text>

  <!-- Stage 1: User Request -->
  <rect x="40" y="340" width="220" height="120" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="150" y="395" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="600">User Request</text>
  <text x="150" y="425" text-anchor="middle" fill="#8b949e" font-size="14">business-language task</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="400" x2="330" y2="400" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 2: Module Concept -->
  <rect x="340" y="340" width="220" height="120" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="450" y="395" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="600">Module Concept</text>
  <text x="450" y="425" text-anchor="middle" fill="#8b949e" font-size="14">business terms -&gt; technical anchors</text>

  <!-- Arrow 2 -->
  <line x1="560" y1="400" x2="630" y2="400" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 3: Memory Layers -->
  <rect x="640" y="340" width="220" height="120" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="750" y="385" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="600">Memory Layers</text>
  <text x="750" y="410" text-anchor="middle" fill="#8b949e" font-size="14">wiki, contracts,</text>
  <text x="750" y="428" text-anchor="middle" fill="#8b949e" font-size="14">session state</text>

  <!-- Arrow 3 -->
  <line x1="860" y1="400" x2="930" y2="400" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Stage 4: Evidence + Confidence Labels -->
  <rect x="940" y="300" width="220" height="200" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="1050" y="335" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="600">Evidence</text>

  <rect x="960" y="355" width="80" height="28" rx="14" fill="#0d3d1f" stroke="#3fb950"/>
  <text x="1000" y="374" text-anchor="middle" fill="#3fb950" font-size="12">confirmed</text>

  <rect x="1050" y="355" width="80" height="28" rx="14" fill="#0d2b4d" stroke="#58a6ff"/>
  <text x="1090" y="374" text-anchor="middle" fill="#58a6ff" font-size="11">inferred</text>

  <rect x="960" y="393" width="150" height="28" rx="14" fill="#4a3b0d" stroke="#d29922"/>
  <text x="1035" y="412" text-anchor="middle" fill="#d29922" font-size="11">runtime-unverified</text>

  <rect x="960" y="431" width="150" height="28" rx="14" fill="#4a1414" stroke="#f85149"/>
  <text x="1035" y="450" text-anchor="middle" fill="#f85149" font-size="11">blocked-by-access</text>

  <text x="1050" y="480" text-anchor="middle" fill="#8b949e" font-size="12">every claim carries a label</text>

  <!-- Footer -->
  <text x="600" y="760" text-anchor="middle" fill="#484f58" font-size="13">modules.md -&gt; module concept -&gt; wiki/contracts -&gt; artifact index -&gt; session state</text>
</svg>
